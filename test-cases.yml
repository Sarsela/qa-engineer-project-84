---
- summary: |
    Проверка поиска товара по ключевому слову
  requirement: |
    Поиск должен возвращать товары, содержащие ключевое слово в названии или описании
  prerequisites: |
    Пользователь находится на главной странице магазина
  test-data: |
    Ключевое слово = "bed"
  steps:
    - Ввести "bed" в поле поиска
    - Нажать кнопку поиска
  expected-result: |
    Отображается список товаров, в названии или описании которых есть слово "bed"

- summary: |
    Проверка фильтрации товаров по цене
  requirement: |
    Фильтр "Цена" должен показывать товары, стоимость которых находится в заданном диапазоне
  prerequisites: |
    Открыта страница каталога товаров
  test-data: |
    От = 1, До = 2200 (доллары США)
  steps:
    - В поле "Цена от" ввести 1
    - В поле "Цена до" ввести 2200
    - Нажать "Применить фильтр"
  expected-result: |
    Отображаются только товары с ценой от 1 до 2200 долларов

- summary: |
    Проверка добавления товара в корзину
  requirement: |
    При нажатии "Add to cart" товар должен появиться в корзине, количество увеличиться
  prerequisites: |
    Открыта карточка товара "Annibale Colombo bed"
  test-data: |
    Товар = "Annibale Colombo bed", цена = 2200 долларов
  steps:
    - Нажать кнопку "Add to cart"
    - Перейти в корзину
  expected-result: |
    В корзине отображается добавленный товар с названием "Annibale Colombo bed" и ценой 2200, количество = 1

- summary: |
    Проверка удаления товара из корзины
  requirement: |
    У товара в корзине должна быть кнопка удаления, после нажатия товар исчезает, общая сумма пересчитывается
  prerequisites: |
    В корзине уже добавлен товар "Annibale Colombo bed" в количестве 1
  test-data: |
    Товар = "Annibale Colombo bed"
  steps:
    - Открыть корзину
    - Нажать кнопку "Удалить" рядом с товаром
  expected-result: |
    Товар пропадает из списка, корзина становится пустой, общая сумма равна 0

- summary: |
    Проверка оформления заказа с пустой корзиной
  requirement: |
    При попытке оформить заказ с пустой корзиной должно быть сообщение "Корзина пуста" или кнопка оформления недоступна
  prerequisites: |
    Корзина пуста, открыта главная страница магазина
  test-data: |
    Нет данных
  steps:
    - Нажать на иконку корзины в шапке сайта
    - Нажать кнопку "Оформить заказ"
  expected-result: |
    Отображается сообщение "Корзина пуста" или кнопка оформления недоступна
