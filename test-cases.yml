---- summary: |
    Проверка входа пользователя с существующими логином и паролем
  requirement: |
    При верном вводе логина и пароля пользователь должен войти в систему и увидеть главную страницу магазина
  prerequisites: |
    Открыта страница логина
  test-data: |
    Логин = user@example.com, Пароль = validPass123
  steps:
    - Ввести email в поле "Email"
    - Ввести пароль в поле "Password"
    - Нажать кнопку "Login"
  expected-result: |
    Пользователь перенаправляется на главную страницу магазина, отображается имя пользователя в шапке сайта

- summary: |
    Проверка входа с неверным паролем
  requirement: |
    При неверном пароле система должна показать сообщение об ошибке и не пустить пользователя в систему
  prerequisites: |
    Открыта страница логина
  test-data: |
    Логин = user@example.com, Пароль = wrongPassword
  steps:
    - Ввести email
    - Ввести неверный пароль
    - Нажать "Login"
  expected-result: |
    Появляется сообщение "Invalid email or password", пользователь остаётся на странице логина

- summary: |
    Проверка поиска товара по ключевому слову
  requirement: |
    Поиск должен возвращать товары, содержащие ключевое слово в названии или описании
  prerequisites: |
    Пользователь находится на главной странице магазина, авторизация не требуется
  test-data: |
    Ключевое слово = "phone"
  steps:
    - Ввести "phone" в поле поиска
    - Нажать кнопку поиска (лупа или Enter)
  expected-result: |
    Отображается список товаров, в названии или описании которых есть слово "phone" (например, Smartphone, Phone case)

- summary: |
    Проверка фильтрации товаров по цене
  requirement: |
    Фильтр "Цена" должен показывать товары, стоимость которых находится в заданном диапазоне
  prerequisites: |
    Открыта страница категории "Электроника"
  test-data: |
    От = 10000, До = 30000 (в рублях)
  steps:
    - В поле "Цена от" ввести 10000
    - В поле "Цена до" ввести 30000
    - Нажать "Применить фильтр"
  expected-result: |
    Отображаются только товары с ценой от 10000 до 30000 рублей

- summary: |
    Проверка добавления товара в корзину
  requirement: |
    При нажатии "Add to cart" товар должен появиться в корзине, количество увеличиться
  prerequisites: |
    Пользователь авторизован, открыта карточка любого товара
  test-data: |
    Товар = "Наушники", цена = 5000
  steps:
    - Нажать кнопку "Add to cart"
    - Перейти в корзину (иконка корзины)
  expected-result: |
    В корзине отображается добавленный товар с корректным названием и ценой, количество = 1

- summary: |
    Проверка удаления товара из корзины
  requirement: |
    У товара в корзине должна быть кнопка удаления, после нажатия товар исчезает
  prerequisites: |
    В корзине есть хотя бы один товар
  test-data: |
    Товар = "Наушники"
  steps:
    - Открыть корзину
    - Нажать кнопку "Удалить" рядом с товаром
  expected-result: |
    Товар пропадает из списка, корзина становится пустой или уменьшается общая сумма

- summary: |
    Проверка оформления заказа с пустой корзиной
  requirement: |
    При попытке оформить заказ с пустой корзиной должно быть сообщение "Корзина пуста"
  prerequisites: |
    Пользователь авторизован, корзина пуста
  test-data: |
    Нет данных
  steps:
    - Перейти в корзину
    - Нажать кнопку "Оформить заказ"
  expected-result: |
    Отображается сообщение "Корзина пуста" или кнопка оформления недоступна

- summary: |
    Проверка логаута
  requirement: |
    При нажатии "Logout" пользователь выходит из системы и перенаправляется на страницу логина
  prerequisites: |
    Пользователь авторизован, открыта главная страница
  test-data: |
    Нет данных
  steps:
    - Нажать на аватар/меню пользователя
    - Выбрать "Logout"
  expected-result: |
    Происходит перенаправление на страницу логина, корзина очищается (если нужно), доступ к личному кабинету закрыт
